<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Banshi Collector</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #e6eef8; background:#0b0b0b; padding:12px; width:320px }
    h1 { font-size:16px; margin:0 0 8px }
    .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px }
    .clients { margin-top:8px; max-height:260px; overflow:auto }
    .client { padding:8px; border:1px solid #222; margin-bottom:6px; border-radius:6px; display:flex; justify-content:space-between; align-items:center }
    button { background:#0ea5a1; color:#061018; border:none; padding:6px 8px; border-radius:6px; cursor:pointer }
    button.ghost { background:transparent; color:#9aa6b2; border:1px solid #222 }
    label { font-size:13px }
    .small { font-size:12px; color:#9aa6b2 }
  </style>
</head>
<body>
  <h1>Banshi Collector</h1>
  <div class="row">
    <div style="font-size:13px">Always monitoring linked clients</div>
    <div>
      <button id="link">Link current profile</button>
    </div>
  </div>
  <div class="small">Monitored clients</div>
  <div id="clients" class="clients"></div>
  <script src="popup.js"></script>
</body>
</html>
